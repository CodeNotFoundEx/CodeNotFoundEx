<head>
    <title>Micro - A Simple Text Editor</title>
</head>
<body>
<h1>Welcome to Micro</h1>
<p>This is a simple text editor built with Java and Spring Boot.</p>
</body>
<script>
    // You can add JavaScript code here if needed
    var str = "hello";

    var response = "";
    for (let i = str.length - 1; i >= 0; i--) {
        response += str[i];
    }
    console.log(response);

    var costOfBasket = function (list) {
        i = 0; res = 0;

        while (i < list.length) {
            res += list[i];
            i++;
        }

        return res;

    };

    console.log(costOfBasket([5.6, 3.5, 1.2, 8, 2.8])); // Output: "apbqcr"
</script>
</html>
