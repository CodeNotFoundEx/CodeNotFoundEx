<script>


    var numarulCifrelor = function (n) {
        if (n == 0) return 1;

        var nr_cifre = 0;
        while (n != 0) {
            n = Math.trunc(n / 10);
            console.log(n);
            nr_cifre++;
        }
        return nr_cifre;
    };

    console.log(numarulCifrelor(-123)); // Output: "apbqcr"
